<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试页面</title>
    <style>
        body{margin:40px auto;text-align:center;font-family:Arial}
        .box{max-width:400px;margin:0 auto;padding:30px;background:#f8f9fa;border-radius:12px}
        button{padding:10px 20px;background:#0d6efd;color:white;border:none;border-radius:6px;cursor:pointer}
        #result{margin-top:20px;padding:15px;background:#e9ecef;border-radius:6px;text-align:left;white-space:pre-wrap}
    </style>
</head>
<body>
    <div class="box">
        <h1>前后端测试页面</h1>
        <button onclick="test()">测试后端接口</button>
        <div id="result"></div>
    </div>

    <script>
        async function test() {
            try {
                // 关键：Vercel 接口路径是 /api/hello
                const res = await fetch('/api/hello');
                const data = await res.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                document.getElementById('result').textContent = '请求失败：' + e.toString();
            }
        }
    </script>
</body>
</html>
