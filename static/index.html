<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Vercel 测试</title>
    <style>
        body{margin:40px;text-align:center;font-family:Arial}
        #res{margin-top:20px;padding:15px;background:#f5f5f5;border-radius:8px;white-space:pre-wrap}
    </style>
</head>
<body>
    <h1>✅ Vercel Python 部署测试</h1>
    <button onclick="test()">点击测试后端接口</button>
    <div id="res"></div>

    <script>
        async function test() {
            try {
                const res = await fetch('/api/hello');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                document.getElementById('res').textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                document.getElementById('res').textContent = '❌ 请求失败：\n' + e.message;
            }
        }
    </script>
</body>
</html>
